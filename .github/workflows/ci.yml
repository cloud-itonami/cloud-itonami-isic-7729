name: CI

# This project's deps.edn pins langgraph via a :git/sha coordinate for a
# bare single-repo checkout, and the :dev alias overrides both langgraph
# and langchain to in-monorepo :local/root paths
# (../../kotoba-lang/langgraph, .../langchain) for offline workspace dev.
# The :dev override paths don't resolve on a bare single-repo checkout,
# so the test job reconstructs the workspace layout by checking out the
# langgraph/langchain siblings (both PUBLIC) into the expected relative
# paths -- no token needed. Same pattern as cloud-itonami-isic-0115 /
# cloud-itonami-isic-869 / cloud-itonami-isic-7710.
#
# Complements the existing .github/workflows/regenerate.yml (nightly
# docs/samples/operator-console.html regeneration) -- this workflow adds
# the lint+test gate on every push/PR that regenerate.yml does not run.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-7729 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (advisor · governor · governor-contract · phase · store-contract, real compiled StateGraph end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-7729
        run: clojure -M:dev:test
      - name: demo runner (compiled StateGraph, end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-7729
        run: clojure -M:dev:run
